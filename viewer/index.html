<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JARVIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #01020a;
    --ink: #e8ecf8;
    --ink-dim: #8b93ad;
    --panel: rgba(6, 9, 24, 0.82);
    --line: rgba(139, 147, 173, 0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; }
  body { font-family: "IBM Plex Mono", monospace; color: var(--ink); }

  #graph { position: fixed; inset: 0; }

  /* ---- Header / legend ---- */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px; pointer-events: none; z-index: 5;
  }
  #hud h1 {
    font-family: "Instrument Serif", serif;
    font-weight: 400; font-size: 28px; letter-spacing: 0.02em;
    color: var(--ink);
  }
  #hud h1 em { font-style: italic; color: var(--ink-dim); }
  #hud .sub {
    font-size: 11px; color: var(--ink-dim); margin-top: 4px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  #legend {
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  #legend .item { display: flex; align-items: center; gap: 8px; color: var(--ink-dim); }
  #legend .dot {
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 8px 1px currentColor;
  }

  #hint {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--ink-dim); letter-spacing: 0.1em;
    text-transform: uppercase; z-index: 5; pointer-events: none;
    transition: opacity 0.6s;
  }

  /* ---- Side panel ---- */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(380px, 92vw);
    background: var(--panel);
    backdrop-filter: blur(14px);
    border-left: 1px solid var(--line);
    padding: 28px 26px;
    display: flex; flex-direction: column; gap: 16px;
    transform: translateX(105%);
    transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 10; overflow-y: auto;
  }
  #panel.open { transform: translateX(0); }
  #panel .group-tag {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 8px;
  }
  #panel .group-tag .dot {
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 10px 2px currentColor;
  }
  #panel h2 {
    font-family: "Instrument Serif", serif;
    font-weight: 400; font-size: 34px; line-height: 1.1;
    text-wrap: balance;
  }
  #panel .rule { height: 1px; background: var(--line); }
  #panel .excerpt {
    font-size: 13px; line-height: 1.65; color: var(--ink);
    opacity: 0.88; text-wrap: pretty;
  }
  #panel .meta { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.06em; }
  #panel .neighbors { display: flex; flex-wrap: wrap; gap: 6px; }
  #panel .neighbors button {
    font-family: inherit; font-size: 11px; color: var(--ink);
    background: rgba(139, 147, 173, 0.12); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 12px; cursor: pointer;
    transition: background 0.2s;
  }
  #panel .neighbors button:hover,
  #panel .neighbors button:focus-visible { background: rgba(139, 147, 173, 0.28); }
  #close {
    position: absolute; top: 18px; right: 18px;
    background: none; border: 1px solid var(--line); border-radius: 999px;
    color: var(--ink-dim); width: 30px; height: 30px; cursor: pointer;
    font-family: inherit; font-size: 14px; line-height: 1;
    transition: color 0.2s, border-color 0.2s;
  }
  #close:hover, #close:focus-visible { color: var(--ink); border-color: var(--ink-dim); }

  /* ---- Ask bar ---- */
  #ask {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: min(560px, calc(100vw - 32px));
    display: flex; flex-direction: column; gap: 10px;
    z-index: 20;
  }
  #answer {
    background: var(--panel);
    backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13px; line-height: 1.6; color: var(--ink);
    display: none; text-wrap: pretty;
  }
  #answer.show { display: block; }
  #answer.error { color: #ff9a9a; }
  #answer .sources { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  #answer .sources button {
    font-family: inherit; font-size: 11px; color: var(--ink);
    background: rgba(139, 147, 173, 0.12); border: 1px solid var(--line);
    border-radius: 999px; padding: 3px 10px; cursor: pointer;
    transition: background 0.2s;
  }
  #answer .sources button:hover,
  #answer .sources button:focus-visible { background: rgba(139, 147, 173, 0.28); }
  #ask form {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel);
    backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s;
  }
  #ask form:focus-within { border-color: rgba(139, 147, 173, 0.6); }
  #ask input {
    flex: 1; min-width: 0;
    background: none; border: none; outline: none;
    font-family: inherit; font-size: 13px; color: var(--ink);
  }
  #ask input::placeholder { color: var(--ink-dim); }
  #ask button[type="submit"] {
    font-family: inherit; font-size: 12px; letter-spacing: 0.06em;
    color: var(--bg); background: var(--ink);
    border: none; border-radius: 999px;
    padding: 8px 18px; cursor: pointer;
    transition: opacity 0.2s;
  }
  #ask button[type="submit"]:hover { opacity: 0.85; }
  #ask button[type="submit"]:disabled { opacity: 0.45; cursor: wait; }

  /* ---- Voice ---- */
  #mic {
    flex: none; width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(139, 147, 173, 0.12);
    border: 1px solid var(--line); border-radius: 999px;
    color: var(--ink-dim); cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  #mic:hover, #mic:focus-visible { color: var(--ink); border-color: var(--ink-dim); }
  #mic.listening {
    color: #ff6b6b; border-color: #ff6b6b;
    background: rgba(255, 107, 107, 0.12);
    animation: mic-pulse 1.4s ease-in-out infinite;
  }
  #mic[hidden] { display: none; }
  #mic svg { width: 16px; height: 16px; }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.35); }
    50% { box-shadow: 0 0 0 7px rgba(255, 107, 107, 0); }
  }
  #voice-status {
    display: none; align-self: center;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  #voice-status.show { display: block; }
  #voice-status .pip { color: #ff6b6b; }
  #voice-status.thinking .pip { color: #f0b35c; }
  #voice-status.speaking .pip { color: #3fd68c; }
  @media (prefers-reduced-motion: reduce) {
    #mic.listening { animation: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    #panel { transition: none; }
  }
</style>
</head>
<body>

<div id="graph" role="application" aria-label="3D knowledge graph of notes"></div>

<header id="hud">
  <div>
    <h1>J.A.R.V.I.S<em>.</em></h1>
    <p class="sub" id="stats">Booting…</p>
  </div>
  <nav id="legend" aria-label="Note groups"></nav>
</header>

<p id="hint">Drag to orbit · scroll to zoom · click a star to read</p>

<div id="ask">
  <div id="answer" role="status" aria-live="polite"></div>
  <p id="voice-status" role="status" aria-live="polite"><span class="pip">●</span> <span class="label"></span></p>
  <form id="ask-form">
    <input id="ask-input" type="text" autocomplete="off" maxlength="500"
           placeholder='Ask anything — or say "Jarvis…"' aria-label="Ask JARVIS a question" />
    <button id="mic" type="button" aria-label="Ask by voice" title="Ask by voice" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <button type="submit">Ask</button>
  </form>
</div>

<aside id="panel" aria-label="Note details" aria-hidden="true">
  <button id="close" aria-label="Close panel">×</button>
  <span class="group-tag"><span class="dot"></span><span class="group-name"></span></span>
  <h2 class="title"></h2>
  <div class="rule"></div>
  <p class="excerpt"></p>
  <div class="rule"></div>
  <p class="meta">Linked notes</p>
  <div class="neighbors"></div>
</aside>

<script src="graph-data.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.180.0",
    "three/": "https://esm.sh/three@0.180.0/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
import ForceGraph3D from 'https://esm.sh/3d-force-graph@1.77.0?external=three';

/* ---------- palette: one hue per group ---------- */
const PALETTE = ['#6f9bff', '#3fd68c', '#f0b35c', '#ff6b6b', '#4dd6e8', '#d8dce8'];
const groups = [...new Set(GRAPH.nodes.map(n => n.group))].sort();
const groupColor = Object.fromEntries(groups.map((g, i) => [g, PALETTE[i % PALETTE.length]]));

/* ---------- adjacency (node ids are array indices) ---------- */
const neighborsOf = GRAPH.nodes.map(() => new Set());
for (const l of GRAPH.links) {
  neighborsOf[l.source].add(l.target);
  neighborsOf[l.target].add(l.source);
}
const linkKey = l => `${typeof l.source === 'object' ? l.source.id : l.source}-${typeof l.target === 'object' ? l.target.id : l.target}`;
const rawLinkKeys = GRAPH.links.map(l => `${l.source}-${l.target}`);

/* ---------- selection state ---------- */
let selected = null;            // node object or null
let highlightNodes = new Set(); // ids
let highlightLinks = new Set(); // "s-t" keys

/* ---------- graph ---------- */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* Newly remembered nodes glow-pulse for a moment after birth */
const PULSE_MS = 2600;
function birthPulse(n) {
  if (!n.__born) return 1;
  const age = Date.now() - n.__born;
  if (age > PULSE_MS) { delete n.__born; return 1; }
  // three swells, decaying
  return 1 + 1.8 * Math.abs(Math.sin(age / PULSE_MS * Math.PI * 3)) * (1 - age / PULSE_MS);
}

const Graph = new ForceGraph3D(document.getElementById('graph'))
  .graphData(GRAPH)
  .backgroundColor('#01020a')
  .showNavInfo(false)
  .nodeLabel(n => `<span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#e8ecf8;background:rgba(6,9,24,.85);padding:3px 8px;border-radius:4px;">${n.label}</span>`)
  .nodeVal(n => (2.5 + neighborsOf[n.id].size * 0.55) * birthPulse(n))
  .nodeColor(n => {
    if (!selected) return groupColor[n.group];
    return highlightNodes.has(n.id) ? groupColor[n.group] : 'rgba(90,98,125,0.18)';
  })
  .nodeOpacity(0.95)
  .nodeResolution(16)
  .linkColor(l => {
    if (!selected) return 'rgba(139,147,173,0.28)';
    return highlightLinks.has(linkKey(l)) ? '#e8ecf8' : 'rgba(90,98,125,0.06)';
  })
  .linkWidth(l => selected && highlightLinks.has(linkKey(l)) ? 1.4 : 0.3)
  .linkDirectionalParticles(l => selected && highlightLinks.has(linkKey(l)) ? 3 : 0)
  .linkDirectionalParticleWidth(1.6)
  .linkDirectionalParticleSpeed(0.006)
  .onNodeClick(node => selectNode(node))
  .onBackgroundClick(() => clearSelection());

// Exposed for debugging and future features (nodes are looked up by numeric id/index)
window.__graph = Graph;
window.__selectNode = id => selectNode(Graph.graphData().nodes[id]);

/* ---------- cinematic bloom ---------- */
if (!reduceMotion) {
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.6,   // strength
    0.6,   // radius
    0.05   // threshold
  );
  Graph.postProcessingComposer().addPass(bloom);
}

/* ---------- starfield ---------- */
{
  const N = 2200, positions = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    // random points on a thick shell so stars stay behind the graph
    const r = 1200 + Math.random() * 2200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0x9fb2e8, size: 1.6, sizeAttenuation: true,
    transparent: true, opacity: 0.65, depthWrite: false
  });
  Graph.scene().add(new THREE.Points(geo, mat));
}

/* ---------- slow idle drift ---------- */
let idle = true;
let idleTimer = null;
let angle = 0;
const DRIFT_DIST = 420;

function driftTick() {
  if (idle && !selected && !reduceMotion) {
    angle += 0.00035;
    Graph.cameraPosition({
      x: DRIFT_DIST * Math.sin(angle),
      y: DRIFT_DIST * 0.22 * Math.sin(angle * 0.7),
      z: DRIFT_DIST * Math.cos(angle)
    });
  }
  requestAnimationFrame(driftTick);
}
Graph.cameraPosition({ x: 0, y: 80, z: DRIFT_DIST });
requestAnimationFrame(driftTick);

function pauseIdle() {
  idle = false;
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (!selected) {
      const p = Graph.cameraPosition();
      angle = Math.atan2(p.x, p.z);   // resume drift from where the user left the camera
      idle = true;
    }
  }, 12000);
}
document.getElementById('graph').addEventListener('pointerdown', pauseIdle);
document.getElementById('graph').addEventListener('wheel', pauseIdle, { passive: true });

/* ---------- selection / panel ---------- */
const panel = document.getElementById('panel');
const hint = document.getElementById('hint');

function selectNode(node) {
  selected = node;
  highlightNodes = new Set([node.id, ...neighborsOf[node.id]]);
  highlightLinks = new Set(
    rawLinkKeys.filter(k => {
      const [s, t] = k.split('-').map(Number);
      return s === node.id || t === node.id;
    })
  );
  refreshStyles();
  pauseIdle();

  // fly the camera to the node
  const d = 200;
  const ratio = 1 + d / Math.hypot(node.x || 1, node.y || 1, node.z || 1);
  Graph.cameraPosition(
    { x: node.x * ratio, y: node.y * ratio, z: node.z * ratio },
    node,
    reduceMotion ? 0 : 1800
  );

  // fill panel
  const color = groupColor[node.group];
  panel.querySelector('.group-tag').style.color = color;
  panel.querySelector('.group-name').textContent = node.group;
  panel.querySelector('.title').textContent = node.label;
  panel.querySelector('.excerpt').textContent = node.excerpt;

  const wrap = panel.querySelector('.neighbors');
  wrap.innerHTML = '';
  [...neighborsOf[node.id]].sort((a, b) => a - b).forEach(id => {
    const nb = GRAPH.nodes[id]; // numeric id == index lookup
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = nb.label;
    btn.addEventListener('click', () => selectNode(Graph.graphData().nodes[id]));
    wrap.appendChild(btn);
  });

  panel.classList.add('open');
  panel.setAttribute('aria-hidden', 'false');
  hint.style.opacity = '0';
}

function clearSelection() {
  selected = null;
  highlightNodes.clear();
  highlightLinks.clear();
  refreshStyles();
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  hint.style.opacity = '1';
  pauseIdle();
}

function refreshStyles() {
  // re-assigning accessors forces 3d-force-graph to restyle
  Graph.nodeColor(Graph.nodeColor())
       .linkColor(Graph.linkColor())
       .linkWidth(Graph.linkWidth())
       .linkDirectionalParticles(Graph.linkDirectionalParticles());
}

document.getElementById('close').addEventListener('click', clearSelection);
window.addEventListener('keydown', e => { if (e.key === 'Escape') clearSelection(); });

/* ---------- HUD ---------- */
document.getElementById('stats').textContent =
  `${GRAPH.nodes.length} notes · ${GRAPH.links.length} connections`;

const legend = document.getElementById('legend');
groups.forEach(g => {
  const el = document.createElement('span');
  el.className = 'item';
  el.innerHTML = `<span class="dot" style="color:${groupColor[g]};background:${groupColor[g]}"></span>${g}`;
  legend.appendChild(el);
});

/* ---------- ask bar (POST /chat) ---------- */
const askForm = document.getElementById('ask-form');
const askInput = document.getElementById('ask-input');
const askButton = askForm.querySelector('button[type="submit"]');
const answerBox = document.getElementById('answer');
const sessionId = crypto.randomUUID();

/* Prove where the answer came from.
   1-3 sources: fly to the top source, light it + its neighbors, open its panel.
   4+ sources: the answer drew on a cluster — light the whole cluster instead of flying. */
function revealSources(nodeIds) {
  if (!nodeIds.length) return;
  const liveNodes = Graph.graphData().nodes;

  if (nodeIds.length < 4) {
    // selectNode flies the camera, highlights neighbors, and opens the panel
    selectNode(liveNodes[nodeIds[0]]);
    // keep the remaining source stars lit alongside the top source's neighborhood
    nodeIds.slice(1).forEach(id => highlightNodes.add(id));
    refreshStyles();
    return;
  }

  // cluster mode: no flight, no panel — light every source and the links between them
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  const cluster = new Set(nodeIds);
  selected = { id: -1 }; // sentinel: dims everything outside the highlight sets
  highlightNodes = cluster;
  highlightLinks = new Set(
    rawLinkKeys.filter(k => {
      const [s, t] = k.split('-').map(Number);
      return cluster.has(s) && cluster.has(t);
    })
  );
  refreshStyles();
  pauseIdle();
}

window.__revealSources = revealSources; // debugging handle, like __selectNode

function showAnswer(text, nodeIds = [], isError = false) {
  answerBox.classList.toggle('error', isError);
  answerBox.textContent = text;
  if (nodeIds.length) {
    const sources = document.createElement('div');
    sources.className = 'sources';
    nodeIds.forEach(id => {
      const node = GRAPH.nodes[id]; // numeric id == array index
      if (!node) return;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = node.label;
      btn.style.borderColor = groupColor[node.group];
      btn.addEventListener('click', () => selectNode(Graph.graphData().nodes[id]));
      sources.appendChild(btn);
    });
    answerBox.appendChild(sources);
  }
  answerBox.classList.add('show');
}

/* ---------- node birth: shared by /remember and /agent ---------- */
// NOTE: Graph was initialized with .graphData(GRAPH), so GRAPH.nodes IS the
// live array — mutate it once, then re-set graphData. Never push copies.
function birthNode({ node, links, anchor }) {
  const anchorNode = anchor != null ? Graph.graphData().nodes[anchor] : null;
  // born at its most related node's position (small offset so the force engine separates them)
  node.x = (anchorNode?.x ?? 0) + 12;
  node.y = (anchorNode?.y ?? 0) + 12;
  node.z = (anchorNode?.z ?? 0) + 12;
  node.__born = Date.now() + 2000; // pulse starts as the camera arrives
  GRAPH.nodes.push(node);
  GRAPH.links.push(...links.map(l => ({ ...l })));
  neighborsOf.push(new Set());
  links.forEach(l => {
    neighborsOf[l.source].add(l.target);
    neighborsOf[l.target].add(l.source);
    rawLinkKeys.push(`${l.source}-${l.target}`);
  });

  // new group gets a color + legend entry the first time
  if (!(node.group in groupColor)) {
    groupColor[node.group] = PALETTE[Object.keys(groupColor).length % PALETTE.length];
    const el = document.createElement('span');
    el.className = 'item';
    el.innerHTML = `<span class="dot" style="color:${groupColor[node.group]};background:${groupColor[node.group]}"></span>${node.group}`;
    legend.appendChild(el);
  }

  Graph.graphData({ nodes: GRAPH.nodes, links: GRAPH.links });

  document.getElementById('stats').textContent =
    `${GRAPH.nodes.length} notes · ${GRAPH.links.length} connections`;

  // fly to the newborn star, keep it pulsing while the size accessor re-evaluates
  const added = Graph.graphData().nodes[node.id];
  setTimeout(() => selectNode(added), 400); // let the force engine place it first
  const pulseUntil = Date.now() + 2000 + PULSE_MS;
  (function repulse() {
    Graph.nodeVal(Graph.nodeVal());
    if (Date.now() < pulseUntil) setTimeout(repulse, 120);
  })();
}

/* ---------- shared POST helper for the ask bar flows ---------- */
async function askApi(path, body, statusLabel, workingText) {
  askButton.disabled = true;
  stopSpeaking();
  setVoiceStatus('thinking', statusLabel);
  showAnswer(workingText);
  try {
    const res = await fetch(path, {
      method: body ? 'POST' : 'GET',
      headers: body ? { 'Content-Type': 'application/json' } : undefined,
      body: body ? JSON.stringify(body) : undefined
    });
    return { ok: res.ok, status: res.status, data: await res.json() };
  } catch {
    return { ok: false, status: 0, data: { error: 'Could not reach the server.' } };
  } finally {
    askButton.disabled = false;
  }
}

/* ---------- remember: grow the brain live ---------- */
const REMEMBER_RE = /^\s*remember\s+that\b/i;

async function rememberNote(text) {
  const { ok, data } = await askApi('/remember', { text }, 'filing…', 'Committing that to memory…');
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  birthNode(data);
  showAnswer(data.answer, [data.node.id]);
  speak(data.answer); // one witty confirmation, not the note
  askInput.value = '';
}

/* ---------- briefing (weather via Open-Meteo, city stored server-side) ---------- */
const BRIEFING_RE = /^\s*(good\s+(morning|afternoon|evening)|briefing|brief\s+me)\b/i;
let awaitingCity = false;

async function runBriefing() {
  const { ok, status, data } = await askApi('/briefing', null, 'briefing…', 'Preparing your briefing…');
  if (status === 409) {
    awaitingCity = true;
    const askCity = 'One detail first, sir — which city shall I watch the skies over? Type it below.';
    showAnswer(askCity);
    speak(askCity);
    return;
  }
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  showAnswer(data.answer);
  speak(data.answer);
  askInput.value = '';
}

async function setCity(city) {
  const { ok, data } = await askApi('/settings', { city }, 'noting…', 'Consulting the atlas…');
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  awaitingCity = false;
  askInput.value = '';
  showAnswer(data.answer);
  speak(data.answer);
  setTimeout(runBriefing, 2200); // now deliver the briefing he originally asked for
}

/* ---------- time machine ---------- */
const TIMEMACHINE_RE = /\b(what\s+(was|did)\s+i\s+(doing|do|ask|work)|time\s+machine)\b/i;

async function runTimeMachine(query) {
  const { ok, data } = await askApi('/timemachine', { query }, 'rewinding…', 'Winding back the clock…');
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  showAnswer(data.answer, data.nodes);
  speak(data.answer);
  if (data.nodes.length) revealSources(data.nodes);
  askInput.value = '';
}

/* ---------- agent hands: plan → "do it" → execute ---------- */
const AGENT_RE = /^\s*(research|repurpose|draft|write|prepare|summari[sz]e)\b/i;
const DOIT_RE = /^\s*(do\s+it|go\s+ahead|proceed|make\s+it\s+so|confirmed?)\b[.!]?\s*$/i;
let pendingAgentTask = false;

async function agentPlan(task) {
  const { ok, data } = await askApi('/agent', { task, session: sessionId }, 'planning…', 'Considering the task…');
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  pendingAgentTask = true;
  showAnswer(data.answer);
  speak(data.answer);
  askInput.value = '';
}

async function agentExecute() {
  pendingAgentTask = false;
  const { ok, data } = await askApi('/agent', { confirm: true, session: sessionId }, 'working…', 'On it, sir…');
  if (!ok) { setVoiceStatus(null); showAnswer(data.error || 'Something went wrong.', [], true); return; }
  birthNode(data);
  showAnswer(data.answer, [data.node.id]);
  speak(data.spoken || data.answer); // deliverable stays on screen; speech stays short
  askInput.value = '';
}

askForm.addEventListener('submit', async e => {
  e.preventDefault();
  const question = askInput.value.trim();
  if (!question || askButton.disabled) return;

  // intent routing, most specific first
  if (awaitingCity) { setCity(question); return; }
  if (REMEMBER_RE.test(question)) { rememberNote(question); return; }
  if (DOIT_RE.test(question) && pendingAgentTask) { agentExecute(); return; }
  if (AGENT_RE.test(question)) { agentPlan(question); return; }
  if (TIMEMACHINE_RE.test(question)) { runTimeMachine(question); return; }
  if (BRIEFING_RE.test(question)) { runBriefing(); return; }

  const { ok, data } = await askApi('/chat', { question, session: sessionId }, 'thinking…', 'Consulting the galaxy…');
  if (!ok) {
    setVoiceStatus(null);
    showAnswer(data.error || 'Something went wrong.', [], true);
    return;
  }
  showAnswer(data.answer, data.nodes);
  speak(data.answer); // short spoken answer only — the note itself is shown on screen
  revealSources(data.nodes);
});

askInput.addEventListener('keydown', e => {
  // Enter during CJK IME composition confirms the text, it must not submit
  if (e.key === 'Enter' && (e.isComposing || e.keyCode === 229)) e.preventDefault();
  // Escape while typing should leave the input, not clear the galaxy selection
  if (e.key === 'Escape') { e.stopPropagation(); askInput.blur(); }
});

/* ---------- voice: status line ---------- */
const voiceStatus = document.getElementById('voice-status');

function setVoiceStatus(mode, label) {
  if (!mode) {
    voiceStatus.classList.remove('show', 'thinking', 'speaking');
    return;
  }
  voiceStatus.classList.remove('thinking', 'speaking');
  if (mode !== 'listening') voiceStatus.classList.add(mode);
  voiceStatus.querySelector('.label').textContent = label;
  voiceStatus.classList.add('show');
}

/* ---------- voice out: speechSynthesis, prefer British English ---------- */
const synth = window.speechSynthesis;
let britishVoice = null;
let audioUnlocked = false;

function pickVoice() {
  if (!synth) return;
  const voices = synth.getVoices();
  if (!voices.length) return;
  britishVoice =
    voices.find(v => v.lang === 'en-GB' && /google/i.test(v.name)) ||
    voices.find(v => v.lang === 'en-GB') ||
    voices.find(v => v.lang.startsWith('en')) ||
    null;
}
pickVoice();
if (synth) synth.addEventListener('voiceschanged', pickVoice);

// Browsers block audio until a user gesture. On the first interaction, run a
// silent utterance so later speech starts reliably.
function unlockAudio() {
  if (audioUnlocked || !synth) return;
  audioUnlocked = true;
  const blank = new SpeechSynthesisUtterance(' ');
  blank.volume = 0;
  synth.speak(blank);
  // audio is now allowed — deliver the boot greeting he couldn't hear on load
  if (pendingGreeting) {
    const g = pendingGreeting;
    pendingGreeting = null;
    setTimeout(() => speak(g), 150);
  }
}
window.addEventListener('pointerdown', unlockAudio, { once: true });
window.addEventListener('keydown', unlockAudio, { once: true });

/* ---------- boot greeting ---------- */
const TOD = (h => h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening')(new Date().getHours());
const GREETING = `Good ${TOD}, sir. JARVIS online — ${GRAPH.nodes.length} notes indexed, all present and accounted for.`;
let pendingGreeting = GREETING; // spoken after the first interaction unlocks audio
showAnswer(GREETING);

function speak(text) {
  if (!synth) { setVoiceStatus(null); return; }
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (britishVoice) u.voice = britishVoice;
  u.lang = britishVoice ? britishVoice.lang : 'en-GB';
  u.rate = 1.02;
  u.onstart = () => setVoiceStatus('speaking', 'speaking…');
  u.onend = () => setVoiceStatus(null);
  u.onerror = () => setVoiceStatus(null);
  synth.speak(u);
}

function stopSpeaking() {
  if (synth) synth.cancel();
}

/* ---------- voice in: wake word + true barge-in ----------
   One continuous recognizer with two modes:
   - passive: quietly waits for "Jarvis…". Hearing it mid-speech CANCELS the
     current utterance instantly (true barge-in). If a command follows the wake
     word in the same breath ("Jarvis, what's on Mars?") it is submitted directly;
     a bare "Jarvis" switches to active listening.
   - active: live transcript into the input, submit on the final result, then
     drop back to passive. The mic button jumps straight to active. */
const micButton = document.getElementById('mic');
const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
const WAKE_RE = /\bjarvis\b/i;
let recognition = null;
let recMode = 'passive';
let recRunning = false;
let micAllowed = true;   // flips false on not-allowed so we stop retrying
let manualStart = false; // only surface mic errors the user caused directly

function setActiveUI(on) {
  micButton.classList.toggle('listening', on);
  micButton.setAttribute('aria-label', on ? 'Stop listening' : 'Ask by voice');
  if (on) setVoiceStatus('listening', 'listening…');
  else if (voiceStatus.querySelector('.label').textContent === 'listening…') setVoiceStatus(null);
}

function enterActive() {
  recMode = 'active';
  stopSpeaking();
  askInput.value = '';
  setActiveUI(true);
}

if (SpeechRec) {
  micButton.hidden = false;
  recognition = new SpeechRec();
  recognition.lang = 'en-GB';
  recognition.continuous = true;      // stays on: this is what makes the wake word work
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => { recRunning = true; };

  recognition.onresult = e => {
    const latest = e.results[e.results.length - 1];
    const transcript = latest[0].transcript.trim();

    if (recMode === 'passive') {
      // true barge-in: the instant "jarvis" is heard — even mid-utterance — cut the speech
      if (WAKE_RE.test(transcript) && synth?.speaking) stopSpeaking();
      if (!latest.isFinal || !WAKE_RE.test(transcript)) return;
      const command = transcript.replace(/^[\s\S]*?\bjarvis\b[,.!?\s]*/i, '').trim();
      if (command.length > 2) {          // "Jarvis, brief me" — one breath, straight through
        stopSpeaking();
        askInput.value = command;
        askForm.requestSubmit();
      } else {
        enterActive();                   // bare "Jarvis" — at your service, listening
      }
      return;
    }

    // active mode: live transcript, submit on final
    askInput.value = transcript;
    if (latest.isFinal && transcript) {
      recMode = 'passive';
      setActiveUI(false);
      askForm.requestSubmit();
    }
  };

  recognition.onerror = e => {
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      micAllowed = false;
      setActiveUI(false);
      if (manualStart) showAnswer('Microphone access was blocked. Allow it in the address bar and try again.', [], true);
    } else if (e.error === 'no-speech' && recMode === 'active') {
      recMode = 'passive';
      setActiveUI(false);
    } // passive no-speech is normal silence — say nothing
    manualStart = false;
  };

  recognition.onend = () => {
    recRunning = false;
    // the recognizer times out periodically — keep the wake word alive
    if (micAllowed && !document.hidden) {
      setTimeout(() => { try { recognition.start(); } catch { /* already restarting */ } }, 400);
    }
  };

  micButton.addEventListener('click', () => {
    unlockAudio(); // the click also unlocks speech output
    manualStart = true;
    if (recMode === 'active') { recMode = 'passive'; setActiveUI(false); return; }
    micAllowed = true;
    enterActive();
    if (!recRunning) { try { recognition.start(); } catch { /* already started */ } }
  });

  // begin passive wake-word listening on the first interaction (mic permission needs a gesture)
  window.addEventListener('pointerdown', () => {
    if (!recRunning && micAllowed) { try { recognition.start(); } catch { /* fine */ } }
  }, { once: true });
}
</script>
</body>
</html>
